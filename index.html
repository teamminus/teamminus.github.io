<!DOCTYPE html>
<html>

<head>
  <script>
    const lang = navigator.language || navigator.userLanguage;
    if (lang.startsWith('fr')) { window.location.replace('./fr/'); }
    else if (lang.startsWith('cs')) { window.location.replace('./cs/'); }
    else { window.location.replace('./en/'); }
  </script>
  <meta http-equiv="refresh" content="0; url=./en/"> <!-- Fallback for browsers that do not support JavaScript -->
  <title>Redirecting...</title>
</head>

</html>
