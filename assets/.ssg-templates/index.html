<!DOCTYPE html>
<html lang="{{lang}}">

<head>
  <!-- Sets default and correct encoding and viewport -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Title and description -->
  <title>Team Minus</title>
  <meta name="description" content="{{head.description}}">

  <!-- SEO meta tags for search engines indexation and score optimisation -->
  <meta name="robots" content="index, follow">
  <meta name="googlebot" content="index, follow">
  <link rel="canonical" href="https://teamminus.github.io/{{lang}}/">

  <!-- Open Graph meta tags for social media sharing -->
  <meta property="og:title" content="{{head.og:title}}">
  <meta property="og:description" content="{{head.og:description}}">
  <meta property="og:url" content="https://teamminus.github.io/{{lang}}/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://teamminus.github.io/assets/images/og-image.jpg">
  <meta property="og:locale" content="{{head.og:locale}}">

  <!-- Alternate language versions for SEO and user experience -->
  <link rel="alternate" hreflang="fr" href="https://teamminus.github.io/fr/">
  <link rel="alternate" hreflang="en" href="https://teamminus.github.io/en/">
  <link rel="alternate" hreflang="x-default" href="https://teamminus.github.io/en/">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../assets/css/index.css">
  <link rel="stylesheet" href="../assets/css/{{lang}}-index.css">
  <link rel="stylesheet" href="../assets/css/fonts.css">

  <link rel="preload" href="../assets/css/index.css" as="style">
  <link rel="preload" href="../assets/css/fonts.css" as="style">

  <!-- Scripts -->
  <script src="../assets/js/scripts.js" defer></script>

  <!-- Metadata for SEO & web crawlers and copyright information -->
  <meta name="author" content="Team Minus">
  <meta name="copyright" content="© 2026 Team Minus">
  <meta name="google" content="notranslate"> <!-- Prevent Google from translating the page -->
  <meta name="theme-color" content="#fff"> <!-- Set the theme color for browsers that support it -->

  <!-- Mastodon certification -->
  <link rel="me" href="https://mastodon.social/@teamminus" />
</head>

<body>
  <header>
    <h1>Team Minus</h1>
    <h2>{{h2}}</h2>
  </header>
  <div id="description">{{description}}</div>
  <footer>{{footer}}</footer>
</body>

</html>
